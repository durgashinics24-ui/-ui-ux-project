<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 64 - Desktop Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 64. CREATE DESKTOP WIREFRAMES COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 64: Widescreen Viewport</span>
                <h2>64. Desktop Web App Shell Wireframe</h2>
                <p class="subtitle">Focus: Multi-column grids, horizontal layouts, prominent navigation layouts, and expansive sidebar control layers.</p>
            </header>

            <!-- WIDESCREEN WEB BROWSER SCREEN INTERFACE MOCKUP -->
            <div class="desktop-viewport-canvas">
                
                <!-- Horizontal Application Header Navigation -->
                <header class="desktop-top-navbar">
                    <div class="desktop-logo-block">MonitorConsole</div>
                    <div class="desktop-nav-links">
                        <div class="nav-placeholder-pill"></div>
                        <div class="nav-placeholder-pill"></div>
                        <div class="nav-placeholder-pill"></div>
                    </div>
                </header>

                <!-- Split Content Workspace Area -->
                <div class="desktop-workspace-split">
                    
                    <!-- Left Sidebar Dashboard Controller Pane -->
                    <aside class="desktop-control-sidebar">
                        <div class="sidebar-item-box active"></div>
                        <div class="sidebar-item-box"></div>
                        <div class="sidebar-item-box"></div>
                        <div class="sidebar-item-box"></div>
                    </aside>

                    <!-- Main Dashboard Analytics Workspace Content -->
                    <main class="desktop-main-body">
                        <div class="hero-intro-banner">
                            <div class="banner-title-line"></div>
                            <div class="banner-body-line"></div>
                        </div>

                        <!-- 3-Column Content Analytics Grid Cards -->
                        <div class="desktop-cards-grid">
                            <div class="analytic-mock-card">
                                <div class="card-circle-art"></div>
                                <div class="card-line-short"></div>
                            </div>
                            <div class="analytic-mock-card">
                                <div class="card-circle-art"></div>
                                <div class="card-line-short"></div>
                            </div>
                            <div class="analytic-mock-card">
                                <div class="card-circle-art"></div>
                                <div class="card-line-short"></div>
                            </div>
                        </div>
                    </main>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
