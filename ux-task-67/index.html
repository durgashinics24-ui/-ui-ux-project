<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 67 - eCommerce Checkout Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 67. DESIGN ECOMMERCE CHECKOUT FLOW COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 67: Checkout Flow</span>
                <h2>67. eCommerce Transaction Checkout Wireframe</h2>
                <p class="subtitle">Focus: Dual-column split handling shipping forms, cart summaries, transparent subtotal metrics, and submission actions.</p>
            </header>

            <!-- WIREFRAME VISUAL CHECKOUT STAGE ENGINE -->
            <div class="checkout-split-layout">
                
                <!-- Left Primary Input Area Panel Forms -->
                <div class="checkout-forms-section">
                    
                    <!-- Progress Step Progress Node Row -->
                    <div class="checkout-stepper-row">
                        <div class="lofi-box step-pill active"></div>
                        <div class="lofi-box step-pill"></div>
                        <div class="lofi-box step-pill"></div>
                    </div>

                    <!-- Input Section Box 1: Address Details -->
                    <div class="form-container-block">
                        <div class="lofi-box form-title-line"></div>
                        <div class="form-fields-grid">
                            <div class="lofi-box field-box-input"></div>
                            <div class="lofi-box field-box-input"></div>
                            <div class="lofi-box field-box-input long"></div>
                        </div>
                    </div>

                    <!-- Input Section Box 2: Payment Details -->
                    <div class="form-container-block">
                        <div class="lofi-box form-title-line short"></div>
                        <div class="form-fields-grid">
                            <div class="lofi-box field-box-input long"></div>
                        </div>
                    </div>

                </div>

                <!-- Right Secondary Sidebar Cart Summary Panel -->
                <aside class="checkout-summary-sidebar">
                    <div class="lofi-box summary-title-line"></div>
                    
                    <!-- Nested Basket Rows Summary -->
                    <div class="summary-items-list">
                        <div class="item-summary-row">
                            <div class="lofi-box thumb-square"></div>
                            <div class="lofi-box text-line-mock"></div>
                        </div>
                        <div class="item-summary-row">
                            <div class="lofi-box thumb-square"></div>
                            <div class="lofi-box text-line-mock"></div>
                        </div>
                    </div>

                    <!-- Divider separator line markup asset block -->
                    <div class="lofi-divider"></div>

                    <!-- Calculation Totals Deck Blocks -->
                    <div class="totals-calculation-block">
                        <div class="calc-row"><span class="label-box"></span><span class="value-box"></span></div>
                        <div class="calc-row"><span class="label-box long"></span><span class="value-box"></span></div>
                    </div>

                    <!-- Final Submission Primary Button Action -->
                    <div class="lofi-box master-submit-action"></div>
                </aside>

            </div>
        </div>
    </div>

</body>
</html>
