<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 68 - Admin Dashboard Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 68. CREATE ADMIN DASHBOARD WIREFRAMES COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 68: Admin Grid</span>
                <h2>68. Admin Control Panel Dashboard Wireframe</h2>
                <p class="subtitle">Focus: Data density, sidebar layout navigation, summary metric cards, analytics graphs, and datatable sheets.</p>
            </header>

            <!-- DASHBOARD VIEWPORT SIMULATOR -->
            <div class="admin-dashboard-canvas">
                
                <!-- Side Navigation Drawer -->
                <aside class="admin-sidebar-nav">
                    <div class="lofi-box sidebar-brand-placeholder"></div>
                    <div class="sidebar-links-stack">
                        <div class="lofi-box sidebar-link active"></div>
                        <div class="lofi-box sidebar-link"></div>
                        <div class="lofi-box sidebar-link"></div>
                    </div>
                </aside>

                <!-- Main Work Console Panel -->
                <main class="admin-main-body">
                    
                    <!-- 3-Column Metric Box Rows -->
                    <div class="metrics-summary-row">
                        <div class="lofi-box summary-metric-box"></div>
                        <div class="lofi-box summary-metric-box"></div>
                        <div class="lofi-box summary-metric-box"></div>
                    </div>

                    <!-- Analytic Graph Data Block -->
                    <div class="lofi-box chart-canvas-placeholder"></div>

                    <!-- Data Table Content Logs -->
                    <div class="datatable-wire-container">
                        <div class="lofi-box table-header-placeholder"></div>
                        <div class="table-rows-stack">
                            <div class="lofi-box data-row-placeholder"></div>
                            <div class="lofi-box data-row-placeholder"></div>
                            <div class="lofi-box data-row-placeholder"></div>
                        </div>
                    </div>

                </main>

            </div>
        </div>
    </div>

</body>
</html>
