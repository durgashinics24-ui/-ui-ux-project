<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 65 - Tablet Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 65. DESIGN TABLET WIREFRAMES COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 65: Tablet Viewport</span>
                <h2>65. Tablet UI Screen Blueprint Wireframe</h2>
                <p class="subtitle">Focus: Flexible dual-column columns, grid splitting, and adaptive navigation layouts for mid-size touch monitors.</p>
            </header>

            <!-- TABLET OUTLINE HARDWARE SIMULATION LAYER -->
            <div class="tablet-frame-wrapper">
                <div class="tablet-screen-viewport">
                    
                    <!-- Tablet App Top Navigation Bar -->
                    <header class="tablet-navbar">
                        <div class="tablet-logo-block">TabWorkspace</div>
                        <div class="tablet-nav-links">
                            <div class="nav-placeholder-pill"></div>
                            <div class="nav-placeholder-pill"></div>
                        </div>
                    </header>

                    <!-- Main Split Grid Body Viewport Layout -->
                    <div class="tablet-body-grid">
                        
                        <!-- Left Main Panel Section Content -->
                        <div class="tablet-primary-content">
                            <div class="lofi-banner-card">
                                <div class="banner-line long"></div>
                                <div class="banner-line short"></div>
                            </div>
                            
                            <!-- Internal 2-Column List Grids -->
                            <div class="tablet-sub-grid">
                                <div class="sub-item-card">
                                    <div class="sub-card-header"></div>
                                    <div class="sub-card-body"></div>
                                </div>
                                <div class="sub-item-card">
                                    <div class="sub-card-header"></div>
                                    <div class="sub-card-body"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Right Secondary Utility Panel Sidebar -->
                        <aside class="tablet-side-panel">
                            <div class="side-panel-header"></div>
                            <div class="side-panel-line"></div>
                            <div class="side-panel-line"></div>
                        </aside>

                    </div>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
