<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 61 - Low-Fidelity Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 61. CREATE LOW-FIDELITY WIREFRAME COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 61: Low-Fi Sketch</span>
                <h2>61. Low-Fidelity Homepage Blueprint</h2>
                <p class="subtitle">Focus: Pure structural layout layout placeholder grid shapes without colors or content blocks.</p>
            </header>

            <!-- WIREFRAME CANVAS CANVAS AREA -->
            <div class="wireframe-canvas">
                
                <!-- Mock Header Bar -->
                <div class="lofi-nav">
                    <div class="lofi-box logo-place"></div>
                    <div class="lofi-row links-place">
                        <div class="lofi-box link-item"></div>
                        <div class="lofi-box link-item"></div>
                        <div class="lofi-box link-item"></div>
                    </div>
                </div>

                <!-- Mock Hero Block Area -->
                <div class="lofi-hero">
                    <div class="lofi-box hero-title-place"></div>
                    <div class="lofi-box hero-text-place"></div>
                    <div class="lofi-box hero-btn-place"></div>
                </div>

                <!-- Mock Feature Matrix Grid Rows -->
                <div class="lofi-grid">
                    <div class="lofi-box grid-item-place"></div>
                    <div class="lofi-box grid-item-place"></div>
                    <div class="lofi-box grid-item-place"></div>
                </div>

            </div>
        </div>
    </div>

</body>
</html>
