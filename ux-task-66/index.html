<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 66 - Onboarding Flow Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 66. CREATE ONBOARDING FLOW WIREFRAMES COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 66: Onboarding Flow</span>
                <h2>66. User Welcome & Onboarding Step Wireframe</h2>
                <p class="subtitle">Focus: App feature highlights, stepper indicators, simple structural progress, and call-to-actions.</p>
            </header>

            <!-- WIREFRAME CANVAS CANVAS WINDOW -->
            <div class="onboarding-canvas">
                
                <!-- Onboarding Step Frame Graphic -->
                <div class="onboarding-window">
                    
                    <!-- Skip Action Trigger Area -->
                    <div class="onboarding-top-row">
                        <div class="lofi-placeholder-box action-skip"></div>
                    </div>

                    <!-- Hero Media Layout Area -->
                    <div class="onboarding-media-block">
                        <div class="lofi-placeholder-box media-circle"></div>
                    </div>

                    <!-- Title & Copy Layout Areas -->
                    <div class="onboarding-text-block">
                        <div class="lofi-placeholder-box text-headline"></div>
                        <div class="lofi-placeholder-box text-body-line"></div>
                        <div class="lofi-placeholder-box text-body-line short"></div>
                    </div>

                    <!-- Flow Navigation Footnotes -->
                    <footer class="onboarding-footer-row">
                        <!-- Progress Dots Indicators -->
                        <div class="flow-step-indicators">
                            <span class="step-dot active"></span>
                            <span class="step-dot"></span>
                            <span class="step-dot"></span>
                        </div>
                        <!-- Primary Forward Action Button -->
                        <div class="lofi-placeholder-box action-next-btn"></div>
                    </footer>

                </div>

            </div>
        </div>
    </div>

</body>
</html>
