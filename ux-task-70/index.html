<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 70 - Booking System Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 70. CREATE BOOKING SYSTEM WIREFRAME COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 70: Scheduling Engine</span>
                <h2>70. Calendar & Appointment Booking Wireframe</h2>
                <p class="subtitle">Focus: Dual-column calendar layouts, date grids, time-slot picker grids, and prominent call-to-actions.</p>
            </header>

            <!-- WIREFRAME BOOKING COMPONENT LAYOUT ENGINE -->
            <div class="booking-system-grid">
                
                <!-- Left Primary Column: Calendar Date Selection Node -->
                <div class="calendar-date-module">
                    <div class="calendar-nav-row">
                        <div class="lofi-box nav-arrow-btn"></div>
                        <div class="lofi-box month-title-line"></div>
                        <div class="lofi-box nav-arrow-btn"></div>
                    </div>
                    
                    <!-- 7x5 Days Blueprint Grid -->
                    <div class="calendar-days-matrix">
                        <!-- Header Rows (Days of the week) -->
                        <div class="lofi-box day-header"></div>
                        <div class="lofi-box day-header"></div>
                        <div class="lofi-box day-header"></div>
                        <div class="lofi-box day-header"></div>
                        <div class="lofi-box day-header"></div>
                        <div class="lofi-box day-header"></div>
                        <div class="lofi-box day-header"></div>
                        
                        <!-- Sample Date Box Slots -->
                        <div class="lofi-box date-slot muted"></div>
                        <div class="lofi-box date-slot muted"></div>
                        <div class="lofi-box date-slot"></div>
                        <div class="lofi-box date-slot selected"></div>
                        <div class="lofi-box date-slot"></div>
                        <div class="lofi-box date-slot"></div>
                        <div class="lofi-box date-slot"></div>
                    </div>
                </div>

                <!-- Right Secondary Column: Time Slots & Submission -->
                <aside class="time-slots-sidebar">
                    <div class="lofi-box slot-section-title"></div>
                    
                    <!-- Available Hour Selectors Stack -->
                    <div class="time-pills-stack">
                        <div class="lofi-box time-pill active"></div>
                        <div class="lofi-box time-pill"></div>
                        <div class="lofi-box time-pill"></div>
                        <div class="lofi-box time-pill"></div>
                    </div>

                    <!-- Final Submission Primary Button Action -->
                    <div class="lofi-box primary-booking-btn"></div>
                </aside>

            </div>
        </div>
    </div>

</body>
</html>
