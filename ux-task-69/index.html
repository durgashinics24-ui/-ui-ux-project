<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UX Task 69 - Chatbot Interface Wireframe</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- 69. DESIGN CHATBOT INTERFACE WIREFRAME COMPONENT -->
        <div class="wireframe-card">
            <header class="wireframe-header">
                <span class="badge">Task 69: Conversational UI</span>
                <h2>69. Automated Chatbot Assistant Wireframe</h2>
                <p class="subtitle">Focus: Conversational chat streams, micro-avatars, left-to-right bubble alignment splits, and functional lower layout inputs.</p>
            </header>

            <!-- SMARTPHONE WIREFRAME DEVICE FRAME SIMULATOR -->
            <div class="chatbot-phone-wrapper">
                <div class="chatbot-screen-viewport">
                    
                    <!-- Chat Header Bar Banner -->
                    <header class="chat-header-bar">
                        <div class="lofi-box bot-avatar-circle"></div>
                        <div class="chat-header-text">
                            <div class="lofi-box bot-name-line"></div>
                            <div class="lofi-box bot-status-line"></div>
                        </div>
                    </header>

                    <!-- Scrollable Chat Messaging Grid History Area -->
                    <main class="chat-bubbles-timeline">
                        
                        <!-- Bubble Row 1: Bot Message -->
                        <div class="bubble-row bot-side">
                            <div class="lofi-box min-avatar"></div>
                            <div class="lofi-box text-bubble-box long"></div>
                        </div>

                        <!-- Bubble Row 2: User Response -->
                        <div class="bubble-row user-side">
                            <div class="lofi-box text-bubble-box medium"></div>
                        </div>

                        <!-- Bubble Row 3: Bot Action/Suggested Cards Options -->
                        <div class="bubble-row bot-side">
                            <div class="lofi-box min-avatar"></div>
                            <div class="chatbot-options-deck">
                                <div class="lofi-box suggestion-pill"></div>
                                <div class="lofi-box suggestion-pill"></div>
                            </div>
                        </div>

                    </main>

                    <!-- Persistent Text Input Messaging Row Footer -->
                    <footer class="chat-input-dock">
                        <div class="lofi-box chat-text-field-mock"></div>
                        <div class="lofi-box chat-send-action-mock"></div>
                    </footer>

                </div>
            </div>

        </div>
    </div>

</body>
</html>
