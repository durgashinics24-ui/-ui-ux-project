<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Core Design System Primitives</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="system-toast" class="toast"></div>
  <main class="layout-vertical" style="gap: 48px;">
    <header class="layout-vertical" style="gap: 8px;">
      <h1>System Component Workspace</h1>
      <p style="color: var(--color-text-muted);">Tasks 81-90: Reusable visual blocks, automated spacing configurations, and strict typography rules.</p>
    </header>
    <section class="responsive-layout-grid">
      <div class="ui-card layout-vertical">
        <h2>Buttons & Interaction States</h2>
        <div class="layout-horizontal" style="flex-wrap: wrap;">
          <button id="primary-action" class="btn btn-primary">Primary Button</button>
          <button id="secondary-action" class="btn btn-secondary">Secondary Button</button>
          <button class="btn btn-primary" disabled>Disabled State</button>
        </div>
        <p id="counter-log" style="font-size: 0.875rem; color: var(--color-text-muted);">Clicks recorded: 0</p>
      </div>
      <div class="ui-card layout-vertical">
        <h2>Core Icon Library Canvas</h2>
        <div class="layout-horizontal">
          <svg class="icon-asset" id="icon-home" xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
          <svg class="icon-asset" id="icon-user" xmlns="http://w3.org" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--color-secondary)" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
